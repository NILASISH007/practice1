<table>
  <tr>
     <th>Slno.</th>
    <th>Name</th>
    <th>Colour</th>
    <th>Quantity</th>
    <th>Price</th>

  </tr>
  <tr *ngFor="let fruitObj of pageItem; let i =index">
    <td>{{i+1}}</td>
    <td>{{fruitObj.name}}</td>
    <td>{{fruitObj.color}}</td>
    <td>{{fruitObj.quantity}}</td>
    <td>{{fruitObj.price}}</td>
  </tr>
  <tr *ngIf="!pageItem||pageItem.length === 0">
<td colspan="5" > No data Available</td>
  </tr>
</table>
<button  (click)="prevPage()" [disabled]="currentPage ===1"> <<</button>
<span *ngFor="let p of pageNumbers ; let i=index">
<button (click)="goToPage(i+1) "[disabled]="currentPage === i+1">{{i+1}}</button>
</span>
<button  (click)="nextPage()" [disabled]="currentPage === totalPages"> >></button>
